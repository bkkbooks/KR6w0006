body:
  text: 稽首禮諸佛及法比丘僧今演毗𡰱法令正法久住戒如海無涯如寶求無猒欲護聖法財衆集聽我欲除四棄法及滅僧殘法障三十捨墮衆集𥊸我毗婆尸式棄毗舍抅留孫拘郍含牟𡰱伽葉釋迦文諸世尊大德為我是事我今欲善諸賢咸共𥊸辟如人毀不堪有所涉毀戒亦如是不得生天人欲得生天上為生人間者常當護戒勿令有毀損如御入險道失轄折軸憂護戒亦如是死時懷恐懼如人自照鏡好醜生欣戚戒亦如是全毀生憂喜如兩陳共戰勇怯有進退戒亦如是淨穢生安畏世間王為最衆流海為最衆星月為最衆聖佛為最一切衆律中戒經為上最如來立禁戒半月半月六法文佛言入衆六名字某甲聽如來無所著等正覺六法不得犯不淨行行欲法若式義摩郍行欲法非式義摩郍非釋種女若與染汙心男子身相觸缺戒應更與戒是中盡形壽不得犯能持不答言能持不淂偷盜乃至草為式義摩郍取人五錢若自取教人取若自斫教人斫若燒若壞色非式義摩郍非釋種女若取減五錢缺戒應更與戒是中盡形壽不淂犯能持不答言能持不淂故斷衆生命乃至蟻子若義式摩郍故自手斷人命求刀與人教死讚死若與非藥若隨胎若猒禱呪術自作教人作者非式義摩郍非釋種女若斷畜生不能變化者命缺戒應更與戒是中盡形壽不淂犯能持不答言能持不淂妄語乃至戲笑若義式摩郍不真實非己有自稱言淂上人法淂解脫三昧正授淂須陀恆果斯陀含果阿郍含果阿羅漢果天來龍來鬼來供養我此非式義摩郍非釋種女若於衆中故作妄語缺戒應更與戒是中盡形壽不淂犯能持不答言能持不淂非時食若式義摩郍非時食缺戒應更與戒是中盡形壽不淂犯能持不答言能持不淂飲酒若式義摩郍飲酒缺戒應更與戒是中盡形壽不淂犯能持不答言能持佛言式義摩郍一切大𡰱戒應學除自手受食與他此學法女具學三法一學根本法即四重是二學六法謂染汙心相觸盜五錢斷衆生命小妄語非時食飲酒三學行法謂大𡰱諸戒及威儀並制學之若犯根本應滅擯若缺學法者更與二年羯磨若違行法直犯佛教即須懺悔不壞本所學六法僧祇律第卅卷云式義𡰱應學十八法若式義摩郍𡰱不學十八法非式義𡰱何十八一一切比丘𡰱下二一切沙𡰱上三於式義摩郍𡰱不淨於大𡰱淨四於大不淨式義𡰱亦不淨五大𡰱淂與式義三宿六式義𡰱淂與沙𡰱三宿七式義𡰱淂與大𡰱授食八除火淨五生種取金銀及錢九自沙授食十𡰱不淂向七聚名淂不煞不盜不不妄語如是十一式義𡰱至布自恣日入僧中䠒跪合掌作如是言阿闍梨耶僧我某甲清淨憶念持如是三而去十二後四波羅夷犯者始學十三十九僧伽婆尸沙已下一一犯隨所作突吉羅十四若破五戒隨犯日數更學何五非時食十五停食食犯吉羅停食食者謂旦起受食至中過中已去限一須臾若過二時名曰非時也式義𡰱晨起應淨洗手齊腕以前不淂粗魯洗五指頭當以灰土揩洗令作聲洗更相摩者不淨更須洗之十六捉錢金銀十七飲酒十八著花者是名十八是式義摩郍二嵗學戒法十誦律云為度任身女後起過佛令二嵗學之可知若式義𡰱行法式義𡰱不淂與大𡰱為伴已戒不滿故自不淂與沙𡰱為伴以非同學故若二𡰱兼一式義𡰱若二式義𡰱兼一沙𡰱為伴餘人不合也十戒相沙者此云息𢙣行慈故曰沙息於十惡故受十戒耳慈念衆生故有不煞也此之十戒乃至衆戒根本先護持之也一不煞若故煞人不淂受大戒若煞畜生至心懺悔淂滅二不盜若偷若劫若強奪若燒若壞他物但直五錢已上不淂受大戒若減五錢若非人畜生物懺悔淂滅三不若人男女若非人男女若畜生男女若侵身分不得大戒若摩觸至心懺悔淂滅四不妄語若稱淂聖不淂受大戒若以重事謗清淨人及誑或欺妄其罪難懺悔餘小妄語聽懺悔已進大戒五不飲酒酒性能發人煩惱改人心性亂人道心多開衆過之門若酒入腹護戒心自制不能淂故宜深防不服狂藥也六不淂著花香油塗身莊餝花艷愛玩其身內懷深著情惑亂道七不歌儛唱妓及往觀聽習近喜戲放縱身口外恣蕩逸道心浮散八不上高廣大床上坐慠慢自處無謙下心情存欺物去道遠矣九不非時食濟命養道冝須應法食味不莭患妨道十不捉持生像金銀寶物供身之具儉素為佳寶玩服多生人貪奪故教不捉也此之十戒中前四性重後六遮重性重者內自起𢙣遮重者外能生𢙣又前四戒是業清淨戒中四戒是行清淨戒後二戒是緣清淨戒若人護持禁戒寧死莫犯如其犯者不如本不出家自毀壞道法汙辱師僧穢亂三寶欺負四恩不消信施益罪多也𡰱修八敬法一應禮大比丘身業恭敬二者不淂罵諸比丘口業無過三者不舉比丘罪為作憶念意業不欺也四者二歲學戒已大僧中受具戒受戒之法由大僧故五者犯僧殘應二部僧中半月行摩郍埵出罪本應堅持既犯此戒罪由僧滅治之法出在大僧六者半月半月大僧中請教授出家人法學戒為先請為師訓開示行則也七者不淂無大僧夏安居修行多難事須依護咨參決疑採訪有地極遠去大僧一由旬卅里即日往反若依沙塞律極遠聽受七日往反成安居也八者安居竟大僧中説三事自恣人多迷己傍矚者明懼脫違失不自覺知幸垂大慈示之不及此八教者前三明敬之儀中二所遵之法後明三請誨之方初則敬人為師須依人取法後則如而行安居文大姊一心念我式義摩郍𡰱某甲今於某伽藍所大界內前三月夏安居房舍破修治故三彼云汝莫放逸答云受持彼人云依誰學戒答云依和上彼答言有疑當往問答云可尓受衣法大姊一心念我式義摩那𡰱某甲此安多會五條衣受一長一短割截衣持三大姊一心念我式義摩郍𡰱某甲此鬱多羅僧七條衣受兩長一短割截衣持三答可尓大姊一心念我式義摩郍𡰱某甲此覆肩衣如法受持三大姊一心念我式義摩郍𡰱某甲此僧祇如法受持三大姊一心念我式義摩郍𡰱某甲此𡰱師檀應量作我命受持大姊一心念我式義摩郍𡰱某甲此鉢多羅僧應量器持受請施主文大姊一心念我式義摩郍𡰱某甲今請大姊為衣藥鉢展轉淨施主願大姊為我作衣藥鉢展轉淨施主慈愍故淨文大姊一心念我式義摩郍𡰱某甲有此長衣若是言長未作淨今為淨故施與大姊為展轉淨故彼受淨者言姊一心念汝有是長衣未作淨今為淨故施與我我今交之持妹施主是誰彼答言某甲受淨者言妹一心念汝有是長衣未作淨為淨故施與我我已受之妹自云施主是某甲律師是衣某甲律師已有妹為某甲律師故善護持著用隨因緣
