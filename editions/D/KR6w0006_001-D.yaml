body:
  text: 稽首禮諸佛及法比丘僧今演毗𡰱法令正法久住戒如海無涯如寶求無猒欲護聖法財眾集聽我欲除四弃法及滅僧殘法障三十捨堕眾集𦗟我毗婆尸式弃毗舎抅㽞孫拘郍含牟𡰱伽葉釋迦文諸世尊大徳為我是事我今欲善諸賢咸共𦗟辟如人毀不堪有所涉毀戒亦如是不得生天人欲得生天上為生人間者常當護戒勿令有毀損如御入險道失鎋折軸憂護戒亦如是死時懷𢙢懼如人自照鏡好醜生欣慼戒亦如是全毀生憂喜如兩陣共戰勇怯有進退戒亦如是淨穢生安畏世間王為最眾流海為最眾星月為最眾聖佛為最一切眾律中戒經為上最如來立禁戒半月半月六法文佛言入眾六名字某甲聽如來無所着等正覺六法不得犯不淨行行欲法若式义摩郍行欲法非式义摩郍非釋種女若与染汙心男子身相觸𡙇戒應更与戒是中盡形壽不得犯能持不荅言能持不淂偷盜乃至草為式义摩郍取人五錢若自取教人取若自斫教人斫若燒若壞色非式义摩郍非釋種女若取減五錢𡙇戒應更与戒是中盡形壽不淂犯能持不荅言能持不淂故断眾生命乃至蟻子若义式摩郍故自手断人命求刀与人教死讚死若与非藥若随胎若猒禱呪術自作教人作者非式义摩郍非釋種女若断畜生不能變化者命𡙇戒應更与戒是中盡形壽不淂犯能持不荅言能持不淂妄語乃至戲笑若义式摩郍不真實非己有自稱言淂上人法淂解脫三昧正授淂湏陁恒果斯陁含果阿郍含果阿羅漢果天來龍來鬼來供養我此非式义摩郍非釋種女若於眾中故作妄語𡙇戒應更与戒是中盡形壽不淂犯能持不荅言能持不淂非時食若式义摩郍非時食𡙇戒應更与戒是中盡形壽不淂犯能持不荅言能持不淂飲酒若式义摩郍飲酒𡙇戒應更与戒是中盡形壽不淂犯能持不荅言能持佛言式义摩郍一切大𡰱戒應學除自手受食与他此學法女具學三法一學根本法即四重是二學六法謂染汙心相觸盜五錢断眾生命小妄語非時食飲酒三學行法謂大𡰱諸戒及威儀並制學之若犯根本應滅𢷤若𡙇學法者更与二年羯磨若違行法直犯佛教即湏懺悔不壞本所學六法僧祇律第卅卷云式义𡰱應學十八法若式义摩郍𡰱不學十八法非式义𡰱何十八一一切比丘𡰱下二一切沙𡰱上三於式义摩郍𡰱不淨於大𡰱淨四於大不淨式义𡰱亦不淨五大𡰱淂与式义三宿六式义𡰱淂与沙𡰱三宿七式义𡰱淂与大𡰱授食八除火淨五生種取金銀及錢九自沙授食十𡰱不淂向七聚名淂不煞不盜不不妄語如是十一式义𡰱至布自恣日入僧中䠒跪合掌作如是言阿闍梨耶僧我某甲清淨憶念持如是三而去十二後四波羅夷犯者始學十三十九僧伽婆尸沙已下一一犯随所作突吉羅十四若破五戒随犯日數更學何五非時食十五停食食犯吉羅停食食者謂旦起受食至中過中已去限一湏臾若過二時名曰非時也式义𡰱晨起應淨洗手齊腕以前不淂粗魯洗五指頭當以灰土揩洗令作聲洗更相摩者不淨更湏洗之十六捉錢金銀十七飲酒十八著花者是名十八是式义摩郍二嵗學戒法十誦律云為度任身女後起過佛令二嵗學之可知若式义𡰱行法式义𡰱不淂与大𡰱為伴已戒不滿故自不淂与沙𡰱為伴以非同學故若二𡰱兼一式义𡰱若二式义𡰱兼一沙𡰱為伴餘人不合也十戒相沙者此云息𢙣行慈故曰沙息於十惡故受十戒耳慈念眾生故有不煞也此之十戒乃至眾戒根本先護持之也一不煞若故煞人不淂受大戒若煞畜生至心懺悔淂滅二不盜若偷若刧若強奪若燒若壞他物但直五錢已上不淂受大戒若減五錢若非人畜生物懺悔淂滅三不若人男女若非人男女若畜生男女若侵身分不得大戒若摩觸至心懺悔淂滅四不妄語若稱淂聖不淂受大戒若以重事謗清淨人及誑或欺妄其罪難懺悔餘小妄語聴懺悔已進大戒五不飲酒酒性能發人煩𢙉改人心性乱人道心多開眾過之門若酒入腹護戒心自制不能淂故宜深防不服狂藥也六不淂着花香油塗身莊餝花艶愛翫其身內懷深着情惑乱道七不歌儛唱妓及往觀聴習近喜戱放縱身口外恣蕩逸道心浮散八不上高廣大床上坐慠𢢔自處無謙下心情存欺物去道遠矣九不非時食濟命養道冝湏應法食味不莭患妨道十不捉持生像金銀寶物供身之具儉素為佳寶翫服多生人貪奪故教不捉也此之十戒中前四性重後六遮重性重者內自起𢙣遮重者外能生𢙣又前四戒是業清淨戒中四戒是行清淨戒後二戒是緣清淨戒若人護持禁戒寧死莫犯如其犯者不如本不出家自毀壞道法汙辱師僧穢乱三寶欺負四恩不消信施益罪多也𡰱修八敬法一應礼大比丘身業恭敬二者不淂罵諸比丘口業无過三者不舉比丘罪為作憶念意業不欺也四者二𡻕學戒已大僧中受具戒受戒之法由大僧故五者犯僧殘應二部僧中半月行摩郍埵出罪本應堅持既犯此戒罪由僧滅治之法出在大僧六者半月半月大僧中請教授出家人法學戒為先請為師訓開示行則也七者不淂無大僧夏安居修行多難事須依護諮參決疑採訪有地極遠去大僧一由旬卅里即日往反若依沙塞律極遠聽受七日往反成安居也八者安居竟大僧中說三事自恣人多迷己傍矚者明懼脫違失不自覺知幸垂大慈示之不及此八教者前三明敬之儀中二所遵之法後明三請誨之方初則敬人為師湏依人取法後則如而行安居文大姉一心念我式义摩郍𡰱某甲今於某伽藍所大界內前三月夏安居房舎破修治故三彼云汝莫放逸荅云受持彼人云依誰學戒荅云依和上彼荅言有疑當往問荅云可尓受衣法大姉一心念我式义摩那𡰱某甲此安多會五條衣受一長一短割截衣持三大姉一心念我式义摩郍𡰱某甲此欝多羅僧七條衣受兩長一短割截衣持三荅可尓大姉一心念我式义摩郍𡰱某甲此覆肩衣如法受持三大姉一心念我式义摩郍𡰱某甲此僧祇如法受持三大姉一心念我式义摩郍𡰱某甲此𡰱師檀應量作我命受持大姉一心念我式义摩郍𡰱某甲此鉢多羅僧應量器持受請施主文大姉一心念我式义摩郍𡰱某甲今請大姉為衣藥鉢展轉淨施主願大姉為我作衣藥鉢展轉淨施主慈愍故淨文大姉一心念我式义摩郍𡰱某甲有此長衣若是言長未作淨今為淨故施与大姉為展轉淨故彼受淨者言姉一心念汝有是長衣未作淨今為淨故施与我我今交之持妹施主是誰彼荅言某甲受淨者言妹一心念汝有是長衣未作淨為淨故施与我我已受之妹自云施主是某甲律師是衣某甲律師已有妹為某甲律師故善護持着用随囙緣
